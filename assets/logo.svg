<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1280" width="1280" height="1280">

      <defs>

        <linearGradient id="body-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6ed666"></stop>
          <stop offset="40%" stop-color="#4cc347"></stop>
          <stop offset="100%" stop-color="#2f9a2c"></stop>
        </linearGradient>
        <linearGradient id="body-side" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#2a8a28" stop-opacity=".55"></stop>
          <stop offset="10%" stop-color="#2a8a28" stop-opacity="0"></stop>
          <stop offset="90%" stop-color="#2a8a28" stop-opacity="0"></stop>
          <stop offset="100%" stop-color="#2a8a28" stop-opacity=".55"></stop>
        </linearGradient>

        <linearGradient id="body-sheen" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0"></stop>
          <stop offset="22%" stop-color="#ffffff" stop-opacity=".08"></stop>
          <stop offset="45%" stop-color="#ffffff" stop-opacity="0"></stop>
          <stop offset="100%" stop-color="#000000" stop-opacity=".06"></stop>
        </linearGradient>

        <radialGradient id="btn-grad" cx="35%" cy="30%" r="80%">
          <stop offset="0%" stop-color="#6cd067"></stop>
          <stop offset="55%" stop-color="#3aa336"></stop>
          <stop offset="100%" stop-color="#1f6b22"></stop>
        </radialGradient>
        <radialGradient id="dpad-grad" cx="40%" cy="30%" r="90%">
          <stop offset="0%" stop-color="#5ec858"></stop>
          <stop offset="60%" stop-color="#33982e"></stop>
          <stop offset="100%" stop-color="#1c5e1f"></stop>
        </radialGradient>
        <linearGradient id="pill-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#dadcd2"></stop>
          <stop offset="100%" stop-color="#9ea59a"></stop>
        </linearGradient>

        <!-- Diamond gradients -->
        <linearGradient id="diaTop" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#e0f0ff"/>
          <stop offset="100%" stop-color="#93c5fd"/>
        </linearGradient>
        <linearGradient id="diaLeft" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#67e8f9"/>
          <stop offset="100%" stop-color="#38bdf8"/>
        </linearGradient>
        <linearGradient id="diaRight" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#c4b5fd"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
        <linearGradient id="diaCenter" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#a5b4fc"/>
          <stop offset="100%" stop-color="#6366f1"/>
        </linearGradient>
        <linearGradient id="diaBotL" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#38bdf8"/>
          <stop offset="100%" stop-color="#4f46e5"/>
        </linearGradient>
        <linearGradient id="diaBotR" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#8b5cf6"/>
          <stop offset="100%" stop-color="#3b82f6"/>
        </linearGradient>
        <!-- Gold diamond -->
        <linearGradient id="goldTop" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#fde68a"/>
          <stop offset="100%" stop-color="#fbbf24"/>
        </linearGradient>
        <linearGradient id="goldLeft" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#fcd34d"/>
          <stop offset="100%" stop-color="#f59e0b"/>
        </linearGradient>
        <linearGradient id="goldRight" x1="100%" y1="0%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="#d97706"/>
          <stop offset="100%" stop-color="#b45309"/>
        </linearGradient>
        <linearGradient id="goldBot" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#d97706"/>
        </linearGradient>
        <linearGradient id="goldBotL" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#b45309"/>
        </linearGradient>
        <linearGradient id="goldBotR" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#d97706"/>
          <stop offset="100%" stop-color="#92400e"/>
        </linearGradient>
        <!-- Pink diamond -->
        <linearGradient id="pinkTop" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#fce7f3"/>
          <stop offset="100%" stop-color="#f0abfc"/>
        </linearGradient>
        <linearGradient id="pinkLeft" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#e879f9"/>
          <stop offset="100%" stop-color="#d946ef"/>
        </linearGradient>
        <linearGradient id="pinkRight" x1="100%" y1="0%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="#c026d3"/>
          <stop offset="100%" stop-color="#a21caf"/>
        </linearGradient>
        <linearGradient id="pinkBot" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#d946ef"/>
          <stop offset="100%" stop-color="#a21caf"/>
        </linearGradient>
        <linearGradient id="pinkBotL" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#d946ef"/>
          <stop offset="100%" stop-color="#86198f"/>
        </linearGradient>
        <linearGradient id="pinkBotR" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#a21caf"/>
          <stop offset="100%" stop-color="#701a75"/>
        </linearGradient>

        <!-- Screen glow -->
        <radialGradient id="screenGlow" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#2a1855" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#050507" stop-opacity="0"/>
        </radialGradient>

        <!-- Sparkle glow -->
        <filter id="sparkGlow">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
        </filter>
      </defs>

      <!-- Title -->
      <text x="640" y="130" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="120" font-weight="300" fill="#e2e8f0" letter-spacing="5">Bling</text>

      <!-- Device -->
      <g>

        <!-- Body shadow -->
        <path d="M 325 190 H 955 V 1036 Q 955 1080 911 1080 H 369 Q 325 1080 325 1036 Z" fill="#000" opacity=".4"></path>

        <!-- Body -->
        <path d="M 320 180 H 950 V 1036 Q 950 1080 906 1080 H 364 Q 320 1080 320 1036 Z" fill="url(#body-grad)"></path>
        <path d="M 320 180 H 950 V 1036 Q 950 1080 906 1080 H 364 Q 320 1080 320 1036 Z" fill="url(#body-side)"></path>
        <path d="M 320 180 H 950 V 1036 Q 950 1080 906 1080 H 364 Q 320 1080 320 1036 Z" fill="url(#body-sheen)"></path>

        <!-- Screen bezel -->
        <rect x="334" y="194" width="602" height="426" rx="6" fill="#050507"></rect>
        <rect x="334" y="194" width="602" height="426" rx="6" fill="none" stroke="#0a3a0c" stroke-width="3"></rect>

        <!-- Screen glow overlay -->
        <rect x="338" y="198" width="594" height="418" rx="4" fill="url(#screenGlow)"/>

        <!-- Screen reflection -->
        <path d="M 342 202 L 928 202 L 928 222 L 342 240 Z" fill="#ffffff" opacity=".05"></path>

        <!-- === SCREEN CONTENT: Gems and sparkles === -->
        <g>
          <!-- Big center diamond -->
          <g transform="translate(635, 360)">
            <!-- Crown -->
            <polygon points="0,-95 -50,-30 50,-30" fill="url(#diaTop)" opacity="0.95"/>
            <polygon points="0,-95 -50,-30 -88,-30" fill="url(#diaLeft)" opacity="0.9"/>
            <polygon points="0,-95 50,-30 88,-30" fill="url(#diaRight)" opacity="0.9"/>
            <!-- Pavilion -->
            <polygon points="-50,-30 50,-30 0,115" fill="url(#diaCenter)" opacity="0.85"/>
            <polygon points="-88,-30 -50,-30 0,115" fill="url(#diaBotL)" opacity="0.8"/>
            <polygon points="50,-30 88,-30 0,115" fill="url(#diaBotR)" opacity="0.8"/>
            <!-- Facet lines -->
            <line x1="-50" y1="-30" x2="0" y2="30" stroke="#ddd6fe" stroke-width="1.2" opacity="0.35"/>
            <line x1="50" y1="-30" x2="0" y2="30" stroke="#ddd6fe" stroke-width="1.2" opacity="0.35"/>
            <line x1="0" y1="30" x2="0" y2="115" stroke="#ddd6fe" stroke-width="1" opacity="0.25"/>
            <!-- Highlight -->
            <polygon points="-14,-88 14,-88 8,-58 -8,-58" fill="white" opacity="0.35"/>
          </g>

          <!-- Gold diamond - lower left -->
          <g transform="translate(480, 460)">
            <polygon points="0,-55 -28,-18 28,-18" fill="url(#goldTop)" opacity="0.95"/>
            <polygon points="0,-55 -28,-18 -50,-18" fill="url(#goldLeft)" opacity="0.9"/>
            <polygon points="0,-55 28,-18 50,-18" fill="url(#goldRight)" opacity="0.9"/>
            <polygon points="-28,-18 28,-18 0,65" fill="url(#goldBot)" opacity="0.85"/>
            <polygon points="-50,-18 -28,-18 0,65" fill="url(#goldBotL)" opacity="0.78"/>
            <polygon points="28,-18 50,-18 0,65" fill="url(#goldBotR)" opacity="0.78"/>
            <line x1="-28" y1="-18" x2="0" y2="15" stroke="#fde68a" stroke-width="0.8" opacity="0.3"/>
            <line x1="28" y1="-18" x2="0" y2="15" stroke="#fde68a" stroke-width="0.8" opacity="0.3"/>
            <polygon points="-8,-50 8,-50 5,-32 -5,-32" fill="white" opacity="0.3"/>
          </g>

          <!-- Pink diamond - right -->
          <g transform="translate(790, 475) scale(0.75)">
            <polygon points="0,-55 -28,-18 28,-18" fill="url(#pinkTop)" opacity="0.95"/>
            <polygon points="0,-55 -28,-18 -50,-18" fill="url(#pinkLeft)" opacity="0.9"/>
            <polygon points="0,-55 28,-18 50,-18" fill="url(#pinkRight)" opacity="0.9"/>
            <polygon points="-28,-18 28,-18 0,65" fill="url(#pinkBot)" opacity="0.85"/>
            <polygon points="-50,-18 -28,-18 0,65" fill="url(#pinkBotL)" opacity="0.78"/>
            <polygon points="28,-18 50,-18 0,65" fill="url(#pinkBotR)" opacity="0.78"/>
            <line x1="-28" y1="-18" x2="0" y2="15" stroke="#fce7f3" stroke-width="0.8" opacity="0.3"/>
            <line x1="28" y1="-18" x2="0" y2="15" stroke="#fce7f3" stroke-width="0.8" opacity="0.3"/>
            <polygon points="-7,-50 7,-50 4,-32 -4,-32" fill="white" opacity="0.35"/>
          </g>

          <!-- Sparkles -->
          <g>
            <!-- Big sparkle - top right of main diamond -->
            <g transform="translate(720, 275)">
              <circle cx="0" cy="0" r="12" fill="white" opacity="0.1" filter="url(#sparkGlow)"/>
              <line x1="-16" y1="0" x2="16" y2="0" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="0" y1="-16" x2="0" y2="16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="-10" y1="-10" x2="10" y2="10" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
              <line x1="10" y1="-10" x2="-10" y2="10" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
              <circle cx="0" cy="0" r="3.5" fill="white"/>
            </g>
            <!-- Sparkle - left of screen -->
            <g transform="translate(395, 345)">
              <circle cx="0" cy="0" r="8" fill="white" opacity="0.08" filter="url(#sparkGlow)"/>
              <line x1="-11" y1="0" x2="11" y2="0" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
              <line x1="0" y1="-11" x2="0" y2="11" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
              <circle cx="0" cy="0" r="2.5" fill="white" opacity="0.8"/>
            </g>
            <!-- Sparkle - right side -->
            <g transform="translate(885, 340)">
              <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
              <line x1="0" y1="-8" x2="0" y2="8" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
              <circle cx="0" cy="0" r="2" fill="white" opacity="0.6"/>
            </g>
            <!-- Gold sparkle -->
            <g transform="translate(440, 420)">
              <line x1="-7" y1="0" x2="7" y2="0" stroke="#fcd34d" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
              <line x1="0" y1="-7" x2="0" y2="7" stroke="#fcd34d" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
              <circle cx="0" cy="0" r="2" fill="#fcd34d" opacity="0.7"/>
            </g>
            <!-- Pink sparkle -->
            <g transform="translate(860, 490)">
              <line x1="-6" y1="0" x2="6" y2="0" stroke="#f0abfc" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
              <line x1="0" y1="-6" x2="0" y2="6" stroke="#f0abfc" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
              <circle cx="0" cy="0" r="1.8" fill="#f0abfc" opacity="0.6"/>
            </g>
            <!-- Tiny sparkle bottom -->
            <g transform="translate(560, 570)">
              <line x1="-5" y1="0" x2="5" y2="0" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
              <line x1="0" y1="-5" x2="0" y2="5" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
              <circle cx="0" cy="0" r="1.5" fill="white" opacity="0.4"/>
            </g>
          </g>
        </g>

        <!-- BRICK HAMMER label -->
        <text x="334" y="662" font-family="Nunito, system-ui, sans-serif" font-weight="900" font-size="15" letter-spacing="2" textLength="146" lengthAdjust="spacingAndGlyphs" fill="#1f6b22">BRICK HAMMER</text>

        <!-- Shoulder pills -->
        <g>
          <rect x="555" y="700" width="68" height="22" rx="11" fill="url(#pill-grad)"></rect>
          <rect x="555" y="700" width="68" height="22" rx="11" fill="none" stroke="#7a8076" stroke-width="1.5"></rect>
          <rect x="650" y="700" width="68" height="22" rx="11" fill="url(#pill-grad)"></rect>
          <rect x="650" y="700" width="68" height="22" rx="11" fill="none" stroke="#7a8076" stroke-width="1.5"></rect>
        </g>

        <!-- D-pad -->
        <g transform="translate(450 788)">
          <g transform="translate(2 3)" opacity=".45">
            <path d="M -28 -88 H 28 V -28 H 88 V 28 H 28 V 88 H -28 V 28 H -88 V -28 H -28 Z" fill="#000"></path>
          </g>
          <path d="M -28 -88 H 28 V -28 H 88 V 28 H 28 V 88 H -28 V 28 H -88 V -28 H -28 Z" fill="url(#dpad-grad)" stroke="#1c5e1f" stroke-width="3" stroke-linejoin="round"></path>
          <circle r="20" fill="#2a8a28"></circle>
          <circle r="20" fill="none" stroke="#1c5e1f" stroke-width="2"></circle>
          <g fill="#1c5e1f" opacity=".75">
            <circle cx="0" cy="-7" r="3.5"></circle>
            <circle cx="-6" cy="4" r="3.5"></circle>
            <circle cx="6" cy="4" r="3.5"></circle>
          </g>
        </g>

        <!-- XYAB buttons -->
        <g transform="translate(820 797)">
          <g transform="translate(0 -70)">
            <circle r="32" fill="url(#btn-grad)" stroke="#1c5e1f" stroke-width="2"></circle>
            <text y="10" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-weight="900" font-size="32" fill="#1c5e1f">X</text>
          </g>
          <g transform="translate(70 0)">
            <circle r="32" fill="url(#btn-grad)" stroke="#1c5e1f" stroke-width="2"></circle>
            <text y="10" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-weight="900" font-size="32" fill="#1c5e1f">A</text>
          </g>
          <g transform="translate(0 70)">
            <circle r="32" fill="url(#btn-grad)" stroke="#1c5e1f" stroke-width="2"></circle>
            <text y="10" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-weight="900" font-size="32" fill="#1c5e1f">B</text>
          </g>
          <g transform="translate(-70 0)">
            <circle r="32" fill="url(#btn-grad)" stroke="#1c5e1f" stroke-width="2"></circle>
            <text y="10" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-weight="900" font-size="32" fill="#1c5e1f">Y</text>
          </g>
        </g>

        <!-- Speaker grilles -->
        <g fill="#1c5e1f">
          <circle cx="370" cy="1015" r="3"></circle>
          <circle cx="385" cy="1015" r="3"></circle>
          <circle cx="400" cy="1015" r="3"></circle>
          <circle cx="415" cy="1015" r="3"></circle>
          <circle cx="430" cy="1015" r="3"></circle>
          <circle cx="445" cy="1015" r="3"></circle>
          <circle cx="377.5" cy="998" r="3"></circle>
          <circle cx="392.5" cy="998" r="3"></circle>
          <circle cx="407.5" cy="998" r="3"></circle>
          <circle cx="422.5" cy="998" r="3"></circle>
          <circle cx="437.5" cy="998" r="3"></circle>
          <circle cx="452.5" cy="998" r="3"></circle>
        </g>
        <g fill="#1c5e1f">
          <circle cx="825" cy="1015" r="3"></circle>
          <circle cx="840" cy="1015" r="3"></circle>
          <circle cx="855" cy="1015" r="3"></circle>
          <circle cx="870" cy="1015" r="3"></circle>
          <circle cx="885" cy="1015" r="3"></circle>
          <circle cx="900" cy="1015" r="3"></circle>
          <circle cx="817.5" cy="998" r="3"></circle>
          <circle cx="832.5" cy="998" r="3"></circle>
          <circle cx="847.5" cy="998" r="3"></circle>
          <circle cx="862.5" cy="998" r="3"></circle>
          <circle cx="877.5" cy="998" r="3"></circle>
          <circle cx="892.5" cy="998" r="3"></circle>
        </g>

        <!-- Bottom buttons -->
        <g>
          <circle cx="555" cy="1010" r="22" fill="url(#btn-grad)" stroke="#1c5e1f" stroke-width="2"></circle>
          <g fill="#1c5e1f" transform="translate(555 1010)">
            <circle cx="0" cy="-6" r="4"></circle>
            <circle cx="-6" cy="4" r="4"></circle>
            <circle cx="6" cy="4" r="4"></circle>
          </g>
          <circle cx="635" cy="1010" r="22" fill="url(#btn-grad)" stroke="#1c5e1f" stroke-width="2"></circle>
          <rect x="624" y="1003" width="22" height="14" rx="2" fill="#1c5e1f"></rect>
          <circle cx="715" cy="1010" r="22" fill="url(#btn-grad)" stroke="#1c5e1f" stroke-width="2"></circle>
          <path d="M 708 1000 L 724 1010 L 708 1020 Z" fill="#1c5e1f"></path>
        </g>

      </g>

      <!-- Subtitle -->
      <text x="640" y="1180" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="48" font-weight="300" fill="#94a3b8" letter-spacing="2">Theme manager for NextUI</text>

    </svg>
